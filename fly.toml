# fly.toml app configuration file generated for campus-greenspace-explorer on 2025-09-18T16:14:50-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lexgreen'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/healthz'

[[mounts]]
  source = 'instance'
  destination = '/app/instance'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
