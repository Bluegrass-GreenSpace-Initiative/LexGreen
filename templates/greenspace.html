{% extends "base.html" %}

{% block title %}{{ name }} – CampusGreen{% endblock %}

{% block extra_css %}
<style>
  .gs-container { padding: 18px; }
  .gs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .gs-actions a { margin-right: 10px; }
  .card { background: linear-gradient(180deg, #262626 0%, #202020 100%); border-radius: 16px; padding: 14px; border: 1px solid #2e2e2e; box-shadow: 0 6px 14px rgba(0,0,0,0.25); }
  #gs-map { height: calc(60vh); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  .tree-list { margin-top: 12px; }
  .list-head { display:flex; align-items:center; gap:8px; color:#E5F2EA; }
  .list { margin-top: 10px; display:flex; flex-direction: column; gap:8px; }
  .tree-item { display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px; background:#2a2a2a; border:1px solid #3a3a3a; cursor:pointer; transition: transform .15s ease, background .15s ease; }
  .tree-item:hover { background:#2d2d2d; transform: translateY(-1px); }
  .ti-icon { width:28px; height:28px; border-radius:8px; background: radial-gradient(85% 85% at 50% 20%, #6aa786 0%, #4f8468 60%, #3c6b53 100%); display:flex; align-items:center; justify-content:center; }
  .ti-icon img { width:18px; height:18px; filter: drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  .ti-main { flex:1; }
  .ti-title { margin:0; color:#E5F2EA; font-weight:600; }
  .ti-sub { margin:0; color:#9BBCA7; font-style: italic; font-size:.9em; }
  .ti-arrow { color:#9BBCA7; }
</style>
{% endblock %}

{% block content %}
<div class="gs-container">
  <div class="gs-header">
    <div>
      <h2 style="margin:0;color:#558B6E">{{ name }}</h2>
      <small>Explore trees within this greenspace</small>
    </div>
    <div class="gs-actions">
      <a href="{{ url_for('index') }}">← Back to Campus Map</a>
    </div>
  </div>
  <div class="card"><div id="gs-map"></div></div>
  <div class="tree-list card">
    <div class="list-head"><strong>Trees in this area</strong> <span id="tree-count"></span></div>
    <div id="tree-list" class="list"><em>Loading…</em></div>
  </div>
  <!-- Hidden data from server -->
  <template id="gs-data" data-north="{{ bounds.north }}" data-south="{{ bounds.south }}" data-east="{{ bounds.east }}" data-west="{{ bounds.west }}"></template>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const t = document.getElementById('gs-data');
    const b = {
      north: parseFloat(t.dataset.north),
      south: parseFloat(t.dataset.south),
      east: parseFloat(t.dataset.east),
      west: parseFloat(t.dataset.west),
    };

    const map = L.map('gs-map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);
    const bounds = L.latLngBounds([b.south, b.west], [b.north, b.east]);
    map.fitBounds(bounds.pad(0.05));

    const markers = L.layerGroup().addTo(map);
    const list = document.getElementById('tree-list');
    const countEl = document.getElementById('tree-count');

    function getTreeIcon(speciesLatin = '', commonName = '') {
      const s = (speciesLatin || '').toLowerCase();
      const c = (commonName || '').toLowerCase();

      // Dedicated icons first
      if (s.includes('stump') || c.includes('stump')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/stump.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('quercus') || c.includes('oak')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/oak.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('acer') || c.includes('maple')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/maple.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('ginkgo') || s.includes('gingko') || c.includes('ginkgo') || c.includes('gingko')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/gingko.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('juglans') || c.includes('walnut')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/walnut.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('ulmus') || c.includes('elm')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/elm.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      if (s.includes('carya') || c.includes('hickory') || c.includes('pecan')) return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/hickory.svg`, iconSize: [24,24], iconAnchor:[12,12] });

      // Evergreen heuristics (conifers + common evergreen broadleaf)
      const evergreenGenera = ['pinus','picea','abies','juniperus','thuja','cupressus','chamaecyparis','cedrus','taxus','ilex','tsuga','pseudotsuga'];
      const evergreenNames = ['pine','spruce','fir','juniper','cedar','cypress','yew','hemlock','holly','evergreen'];
      if (evergreenGenera.some(g => s.includes(g)) || evergreenNames.some(n => c.includes(n))) {
        return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/evergreen.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      }

      // Flowering heuristics (including Catalpa and Goldenrain Tree)
      const floweringGenera = ['prunus','malus','magnolia','cercis','cornus','amelanchier','lagerstroemia','styrax','crataegus','pyrus','liriodendron','tilia','catalpa','koelreuteria'];
      const floweringNames = ['cherry','apple','crabapple','magnolia','redbud','dogwood','serviceberry','hawthorn','pear','crape','tulip','flowering','catalpa','goldenrain','golden rain'];
      if (floweringGenera.some(g => s.includes(g)) || floweringNames.some(n => c.includes(n))) {
        return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/flowering.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      }

      // Explicit deciduous catch (covers user‑mentioned species)
      const deciduousGenera = ['liquidambar','carya','ulmus','fraxinus','fagus','platanus','celtis','zelkova','aesculus','gleditsia','styphnolobium','sophora']; // sweetgum, hickory/pecan, elm, ash, beech, sycamore, hackberry, zelkova, buckeye, honey locust, japanese pagoda (Styphnolobium/Sophora)
      const deciduousNames = ['sweet gum','sweetgum','pecan','elm','hickory','ash','beech','sycamore','yellowwood','american yellowwood','yellow wood','hackberry','zelkova','sawleaf zelkova','buckeye','honey locust','locust','japanese pagoda','pagoda'];
      if (deciduousGenera.some(g => s.includes(g)) || deciduousNames.some(n => c.includes(n))) {
        return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/deciduous.svg`, iconSize: [24,24], iconAnchor:[12,12] });
      }

      // Default to deciduous
      return L.icon({ iconUrl: `{{ url_for('static', filename='images/tree-markers') }}/deciduous.svg`, iconSize: [24,24], iconAnchor:[12,12] });
    }

    function iconUrlForTree(t){
      const icon = getTreeIcon(t.latin_name, t.common_name);
      return icon.options.iconUrl;
    }

    function renderTrees(trees) {
      markers.clearLayers();
      list.innerHTML = '';
      trees.forEach(t => {
        const m = L.marker([t.latitude, t.longitude], { icon: getTreeIcon(t.latin_name, t.common_name) }).addTo(markers);
        const returnTo = encodeURIComponent(window.location.pathname + window.location.search);
        const html = `
          <div>
            <strong>${t.common_name || 'Tree'}</strong><br/>
            <em>${t.latin_name || ''}</em><br/>
            ${t.dbh ? `DBH: ${t.dbh} cm<br/>` : ''}
            <a href="/tree/${t.tree_id}?return_to=${returnTo}">View details</a>
          </div>
        `;
        m.bindPopup(html);
        m.on('click', () => {
          window.location.href = `/tree/${t.tree_id}?return_to=${returnTo}`;
        });

        const row = document.createElement('div');
        row.className = 'tree-item';
        row.innerHTML = `
          <div class="ti-icon"><img src="${iconUrlForTree(t)}" alt="icon"></div>
          <div class="ti-main">
            <p class="ti-title">${t.common_name || 'Tree'}</p>
            ${t.latin_name ? `<p class="ti-sub">${t.latin_name}</p>` : ''}
          </div>
          <div class="ti-arrow">›</div>
        `;
        row.addEventListener('click', () => {
          window.location.href = `/tree/${t.tree_id}?return_to=${returnTo}`;
        });
        list.appendChild(row);
      });
      countEl.textContent = `(${trees.length})`;
      if (trees.length === 0) {
        list.innerHTML = '<em>No trees found in this area.</em>';
      }
    }

    const qs = new URLSearchParams({ north: b.north, south: b.south, east: b.east, west: b.west }).toString();
    fetch(`/api/trees/area?${qs}`)
      .then(r => r.json())
      .then(data => {
        if (Array.isArray(data)) {
          renderTrees(data);
        } else {
          console.error('Unexpected response shape for trees/area', data);
          list.innerHTML = '<em>Unable to load trees for this area.</em>';
        }
      })
      .catch(e => {
        console.error('Failed to load trees for greenspace', e);
        list.innerHTML = '<em>Error loading trees.</em>';
      });
  });
</script>
{% endblock %}
