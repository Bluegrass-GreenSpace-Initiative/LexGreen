{% extends "base.html" %}

{% block title %}My Activity – LexGreen{% endblock %}

{% block extra_css %}
<style>
  .ma-container { padding: 18px; }
  .card { background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); box-shadow: 0 6px 14px rgba(0,0,0,0.18); color: var(--text); }
  .list { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
  .row { display:grid; grid-template-columns: 36px 1fr auto; gap:10px; align-items:center; background: var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; }
  .small { color: var(--muted); font-size: .9em; }
  .btn-inline { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:10px; background: var(--nav-link-bg); border:1px solid var(--nav-link-border); color: var(--text); text-decoration:none; }
  .btn-inline:hover { background: var(--surface-2); }
  .empty { color: var(--muted); font-style: italic; }

  @media (max-width: 600px) {
    .ma-container { padding: 10px 8px; }
    .card { border-radius: 12px; padding: 12px; }
    .list { gap:8px; margin-top:8px; }
    .row { grid-template-columns: 28px 1fr auto; gap:8px; padding:8px; border-radius:10px; }
    .btn-inline { padding:6px 8px; }
  }
</style>
{% endblock %}

{% block content %}
<div class="ma-container">
  <div class="card" style="margin-bottom:14px;">
    <h2 style="margin:0;color: var(--nav-active-bg-end);">My Adopted Trees</h2>
    <div id="count" class="small"></div>
    <div id="list" class="list"><div class="empty">Loading…</div></div>
  </div>
  <div class="card">
    <h2 style="margin:0;color: var(--nav-active-bg-end);">My Reports</h2>
    <div id="r-count" class="small"></div>
    <div id="r-list" class="list"><div class="empty">Loading…</div></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Play a soft chirp when arriving on My Activity
    try {
      if (window.cgAudio) {
        window.cgAudio.play('chirp');
      } else {
        const a = new Audio('{{ url_for('static', filename='audio/open-chirp.mp3') }}');
        a.volume = 0.9;
        a.play().catch(()=>{});
      }
    } catch (e) {}

    function getOrCreateUserId() {
      try {
        let id = localStorage.getItem('cg_uid');
        if (!id) {
          id = 'u-' + ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
            (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
          );
          localStorage.setItem('cg_uid', id);
          document.cookie = `cg_uid=${id}; path=/; max-age=31536000`;
        }
        return id;
      } catch (e) { return 'u-fallback'; }
    }
    const userId = getOrCreateUserId();

    const list = document.getElementById('list');
    const count = document.getElementById('count');
    const rList = document.getElementById('r-list');
    const rCount = document.getElementById('r-count');

    fetch(`/api/adoptions?user_id=${encodeURIComponent(userId)}`)
      .then(r => r.json())
      .then(rows => {
        // Best-effort client dedupe: keep latest adoption per tree_id
        const uniq = new Map();
        if (Array.isArray(rows)) {
          rows.forEach(r => {
            const key = String(r.tree_id);
            const prev = uniq.get(key);
            if (!prev || (r.adopted_at||'') > (prev.adopted_at||'')) uniq.set(key, r);
          });
        }
        const listRows = Array.from(uniq.values());
        if (listRows.length === 0) {
          list.innerHTML = '<div class="empty">No adopted trees yet.</div>';
          count.textContent = '';
          return;
        }
        count.textContent = `${listRows.length} adopted`;
        list.innerHTML = '';
        listRows.forEach(r => {
          const row = document.createElement('div');
          row.className = 'row';
          const iconUrl = window.treeIcons?.getIconUrl(r.latin_name, r.common_name) || '';
          row.innerHTML = `
            <div><img src="${iconUrl}" alt="icon" width="24" height="24" style="display:block"></div>
            <div>
              <div><strong>${r.common_name || 'Tree'}</strong>${r.latin_name ? ` <span class="small"><em>${r.latin_name}</em></span>` : ''}</div>
              <div class="small">Adopted: ${r.adopted_at || '—'} • Health: ${'●'.repeat(r.health||0)}${'○'.repeat(4-(r.health||0))}</div>
            </div>
            <div>
              <a class="btn-inline" href="/tree/${r.tree_id}">View →</a>
            </div>
          `;
          list.appendChild(row);
        });
      })
      .catch(() => { list.innerHTML = '<div class="empty">Failed to load.</div>'; });

    // Load my unified requests (work orders)
    fetch(`/api/work-orders/user?user_id=${encodeURIComponent(userId)}`)
      .then(r => r.json())
      .then(rows => {
        const listRows = Array.isArray(rows) ? rows : [];
        if (listRows.length === 0) {
          rList.innerHTML = '<div class="empty">No requests yet.</div>';
          rCount.textContent = '';
          return;
        }
        rCount.textContent = `${listRows.length} submitted`;
        rList.innerHTML = '';
        listRows.forEach(r => {
          const iconUrl = window.treeIcons?.getIconUrl(r.latin_name, r.common_name) || '';
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div><img src="${iconUrl}" alt="icon" width="24" height="24" style="display:block"></div>
            <div>
              <div><strong>${r.common_name || r.title || 'Request'}</strong> <span class="small">• ${new Date(r.created_at).toLocaleString()}</span></div>
              <div class="small">${(r.type||'issue').toString().replace(/^./, c=>c.toUpperCase())} • Status: ${(r.status||'open')} • P${r.priority}${r.description ? ` • ${r.description}` : ''}${r.resolved_at ? ` • Resolved: ${new Date(r.resolved_at).toLocaleString()}` : ''}</div>
            </div>
            <div>
              <a class="btn-inline" href="/tree/${r.tree_id}">View →</a>
            </div>
          `;
          rList.appendChild(row);
        });
      })
      .catch(() => { rList.innerHTML = '<div class="empty">Failed to load.</div>'; });
  });
</script>
{% endblock %}
