<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LexGreen — Offline</title>
  <meta name="theme-color" content="#558B6E">
  <style>
    :root { color-scheme: light dark; }
    /* Try to use Inter if cached; otherwise fall back to system stack */
    @font-face {
      font-family: 'Inter';
      src: url('/static/fonts/Inter-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    body { margin: 0; font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:#0f1412; color:#E5F2EA; display:flex; min-height:100svh; }
    .wrap { max-width: 640px; margin:auto; padding: 32px; text-align:center; }
    .logo { width: 88px; height: 88px; border-radius: 20%; box-shadow: 0 2px 12px rgba(0,0,0,0.35); }
    h1 { margin: 16px 0 8px; font-size: 1.6rem; }
    p { opacity: 0.9; line-height: 1.5; }
    .actions { margin-top: 20px; display:flex; gap:12px; justify-content:center; flex-wrap: wrap; }
    a.button { background:#558B6E; color:#0f1412; padding:10px 14px; border-radius:10px; text-decoration:none; font-weight:600; }
    .tips { margin-top: 18px; font-size: 0.95rem; opacity: 0.85; }
  </style>
  <link rel="icon" href="/static/images/favicon.ico">
</head>
<body>
  <div class="wrap" role="main">
    <img class="logo" src="/static/images/logo-og.png" alt="LexGreen logo" width="88" height="88">
    <h1>You're Offline</h1>
    <p>
      LexGreen can’t reach the network right now. You can still open the app
      and view any pages you recently visited.
    </p>
    <div class="actions">
      <a class="button" href="/">Go to Home</a>
    </div>
    <p class="tips">Tip: once back online, refresh to get the latest data.</p>
  </div>
</body>
</html>
